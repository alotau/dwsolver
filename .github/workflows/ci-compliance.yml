name: ISO/IEC TS 17961 Compliance

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'specs/014-iso-ts-17961-compliance/**'
      - '.github/workflows/ci-compliance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'specs/014-iso-ts-17961-compliance/**'
      - '.github/workflows/ci-compliance.yml'

jobs:
  ts17961-compliance:
    name: ISO/IEC TS 17961 Compliance (cppcheck + clang-tidy)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      #  Install tooling                                                     #
      # ------------------------------------------------------------------ #
      - name: Install cppcheck and clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy libglpk-dev

      # ------------------------------------------------------------------ #
      #  Version gate — fail early if versions are too old                  #
      # ------------------------------------------------------------------ #
      - name: Verify cppcheck version (>= 2.12 required for cert addon)
        run: |
          version=$(cppcheck --version | sed 's/Cppcheck //')
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          echo "cppcheck version: $version"
          if [ "$major" -lt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -lt 12 ]; }; then
            echo "ERROR: cppcheck $version is too old; >= 2.12 required for cert addon." >&2
            exit 1
          fi

      - name: Verify clang-tidy version (>= 17 required for cert-* checks)
        run: |
          version=$(clang-tidy --version | grep -oP '(?<=version )\d+' | head -1)
          echo "clang-tidy major version: $version"
          if [ "$version" -lt 17 ]; then
            echo "ERROR: clang-tidy $version is too old; >= 17 required for cert-* checks." >&2
            exit 1
          fi

      # ------------------------------------------------------------------ #
      #  Locate the cert addon shipped with cppcheck                        #
      # ------------------------------------------------------------------ #
      - name: Locate cert.py addon
        run: |
          cert_path=$(find /usr/share/cppcheck /usr/lib/cppcheck 2>/dev/null \
                      -name "cert.py" | head -1 || true)
          if [ -z "$cert_path" ]; then
            echo "ERROR: cert.py addon not found in cppcheck installation." >&2
            echo "       Ensure the cppcheck package includes addons (cppcheck >= 2.12)." >&2
            exit 1
          fi
          echo "cert_addon=$cert_path" >> $GITHUB_ENV
          echo "Found cert addon: $cert_path"

      # ------------------------------------------------------------------ #
      #  cppcheck — ISO/IEC TS 17961 cert addon scan                       #
      # ------------------------------------------------------------------ #
      - name: cppcheck (cert addon) — src/dw_*.c
        run: |
          cppcheck \
            --addon=cert \
            --enable=warning,style,performance,portability \
            --suppressions-list=specs/014-iso-ts-17961-compliance/audit/cppcheck-na-suppressions.txt \
            --error-exitcode=1 \
            --std=c11 \
            --platform=unix64 \
            -I src \
            src/dw_blas.c \
            src/dw_globals.c \
            src/dw_main.c \
            src/dw_phases.c \
            src/dw_rounding.c \
            src/dw_solver.c \
            src/dw_subprob.c \
            src/dw_support.c

      # ------------------------------------------------------------------ #
      #  clang-tidy — cert-* checks                                         #
      # ------------------------------------------------------------------ #
      - name: Build compile_commands.json for clang-tidy
        run: |
          sudo apt-get install -y bear
          GLPK_CFLAGS=-I/usr/include GLPK_LIBS=-lglpk \
            bear -- make -B > /dev/null 2>&1 || true

      - name: clang-tidy (cert-*) — src/dw_*.c
        run: |
          clang-tidy \
            -checks='cert-*' \
            --warnings-as-errors='cert-*' \
            src/dw_blas.c \
            src/dw_globals.c \
            src/dw_main.c \
            src/dw_phases.c \
            src/dw_rounding.c \
            src/dw_solver.c \
            src/dw_subprob.c \
            src/dw_support.c \
            -- -std=c11 -I src -I /usr/include

      # ------------------------------------------------------------------ #
      #  SC-003 Enforcement gate                                            #
      # ------------------------------------------------------------------ #
      - name: SC-003 synthetic violation gate
        run: bash tests/test_ts17961_enforcement.sh

      # ------------------------------------------------------------------ #
      #  Regression test suite                                              #
      # ------------------------------------------------------------------ #
      - name: Suppress automake regeneration
        run: touch aclocal.m4 configure config.h.in build-aux/ltmain.sh Makefile.in src/Makefile.in

      - name: Build
        run: |
          GLPK_CFLAGS=-I/usr/include GLPK_LIBS=-lglpk \
            ./configure && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Regression tests
        run: cd tests && bash dw-tests.sh
