name: Docker

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dwsolver .

      - name: Smoke test
        run: docker run --rm dwsolver 2>&1 | grep -q "Usage:"
