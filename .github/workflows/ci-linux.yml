name: Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        # The pre-generated autotools files were created with automake-1.17 on
        # macOS. Touch them so make does not try to re-run aclocal-1.17, which
        # is not available on Ubuntu.
        run: touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in

      - name: Build
        run: ./configure && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh

  linux-asan-ubsan:
    name: Linux (ASan+UBSan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        run: touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in tests/Makefile.in

      - name: Build
        run: ./configure CFLAGS="-fsanitize=address,undefined -g -O1" && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh

  linux-tsan:
    name: Linux (TSan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        run: touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in tests/Makefile.in

      - name: Build
        run: ./configure CFLAGS="-fsanitize=thread -g -O1" && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh
