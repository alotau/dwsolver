name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        run: touch aclocal.m4 configure config.h.in build-aux/ltmain.sh Makefile.in src/Makefile.in

      - name: Install dependencies
        run: |
          brew install glpk
          # Homebrew's GLPK formula does not ship a glpk.pc file; bypass pkg-config
          # by exporting the CFLAGS/LIBS variables that PKG_CHECK_MODULES checks first.
          GLPK_PREFIX=$(brew --prefix glpk)
          echo "GLPK_CFLAGS=-I${GLPK_PREFIX}/include" >> $GITHUB_ENV
          echo "GLPK_LIBS=-L${GLPK_PREFIX}/lib -lglpk" >> $GITHUB_ENV

      - name: Build
        run: ./configure --enable-named-semaphores && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh
