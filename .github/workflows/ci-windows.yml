name: Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-winpthreads-git
            make
            automake
            diffutils

      - name: Suppress automake regeneration and refresh config scripts
        run: |
          touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in
          cp "$(find /usr -name config.guess | head -1)" config.guess
          cp "$(find /usr -name config.sub   | head -1)" config.sub

      - name: Build
        run: ./configure && make

      - name: Test
        run: |
          export PATH="$PWD/src:$PATH"
          cd tests && bash dw-tests.sh
