name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-winpthreads-git
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glpk
            make
            automake
            diffutils

      - name: Export GLPK build variables
        run: |
          # MSYS2's glpk package ships a .pc file, but export CFLAGS/LIBS
          # explicitly so PKG_CHECK_MODULES succeeds even if pkg-config fails.
          echo "GLPK_CFLAGS=-I/mingw64/include" >> $GITHUB_ENV
          echo "GLPK_LIBS=-L/mingw64/lib -lglpk" >> $GITHUB_ENV

      - name: Suppress automake regeneration and refresh config scripts
        run: |
          touch aclocal.m4 configure config.h.in build-aux/ltmain.sh Makefile.in src/Makefile.in
          cp "$(find /usr -name config.guess | head -1)" build-aux/config.guess
          cp "$(find /usr -name config.sub   | head -1)" build-aux/config.sub

      - name: Build
        run: ./configure && make

      - name: Test
        run: |
          export PATH="$PWD/src:$PATH"
          cd tests && bash dw-tests.sh
