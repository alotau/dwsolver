name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        run: touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in

      - name: Build
        run: ./configure --enable-named-semaphores && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Suppress automake regeneration
        # The pre-generated autotools files were created with automake-1.17 on
        # macOS. Touch them so make does not try to re-run aclocal-1.17, which
        # is not available on Ubuntu.
        run: touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in

      - name: Build
        run: ./configure && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-winpthreads-git
            make
            automake

      - name: Suppress automake regeneration and refresh config scripts
        run: |
          touch aclocal.m4 configure config.h.in ltmain.sh Makefile.in src/Makefile.in
          cp "$(find /usr -name config.guess | head -1)" config.guess
          cp "$(find /usr -name config.sub   | head -1)" config.sub

      - name: Build
        run: ./configure && make

      - name: Add dwsolver to PATH
        run: echo "$GITHUB_WORKSPACE/src" >> $GITHUB_PATH

      - name: Test
        run: cd tests && bash dw-tests.sh

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dwsolver .

      - name: Smoke test
        run: docker run --rm dwsolver 2>&1 | grep -q "Usage:"
